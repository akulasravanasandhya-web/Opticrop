<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiCrop - Smart Agriculture</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-success { background-color: #2e7d32; border: none; }
        .btn-success:hover { background-color: #1b5e20; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <h2 class="text-center text-success mb-4">🌱 OptiCrop Recommendation System</h2>
                    <p class="text-muted text-center">Enter soil nutrients & environmental factors to get smart recommendations.</p>
                    <hr>
                    <form action="/predict" method="POST">
                        <div class="row g-3">
                            <div class="col-sm-4">
                                <label class="form-label">Nitrogen (N)</label>
                                <input type="number" step="any" name="N" class="form-control" required placeholder="e.g. 40">
                            </div>
                            <div class="col-sm-4">
                                <label class="form-label">Phosphorus (P)</label>
                                <input type="number" step="any" name="P" class="form-control" required placeholder="e.g. 50">
                            </div>
                            <div class="col-sm-4">
                                <label class="form-label">Potassium (K)</label>
                                <input type="number" step="any" name="K" class="form-control" required placeholder="e.g. 42">
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label">Temperature (°C)</label>
                                <input type="number" step="any" name="temperature" class="form-control" required placeholder="e.g. 25.6">
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label">Humidity (%)</label>
                                <input type="number" step="any" name="humidity" class="form-control" required placeholder="e.g. 82.4">
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label">Soil pH Level</label>
                                <input type="number" step="any" name="ph" class="form-control" required placeholder="e.g. 6.5">
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label">Rainfall (mm)</label>
                                <input type="number" step="any" name="rainfall" class="form-control" required placeholder="e.g. 202.9">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100 mt-4 py-2">Predict Suitable Crop</button>
                    </form>
                    {% if prediction_text %}
                    <div class="alert alert-info text-center mt-4 fs-5 fw-bold" role="alert">
                        {{ prediction_text }}
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
